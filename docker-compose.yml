services:
  # ============================================================================
  # Profile: infra - Serviços de infraestrutura (Qdrant)
  # Uso: docker compose --profile infra up -d
  # Nota: Ollama roda localmente (não via Docker). Veja README.md / SETUP.md.
  # ============================================================================

  qdrant:
    image: qdrant/qdrant:latest
    container_name: smartb100_qdrant
    profiles: ["infra"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - smartb100_net

  # ============================================================================
  # Profile: app - Serviços de aplicação (API + Gradio UI)
  # Uso: docker compose --profile infra --profile app up -d
  # ============================================================================

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: smartb100_api
    profiles: ["app"]
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - CHAT_MODEL=llama3.2:3b
      - EMBED_MODEL=nomic-embed-text
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./smartb100_v2.db:/app/smartb100_v2.db
    restart: unless-stopped
    depends_on:
      - qdrant
    networks:
      - smartb100_net

  gradio:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: smartb100_gradio
    profiles: ["app"]
    ports:
      - "7860:7860"
    environment:
      - API_URL=http://api:8000
    command: ["python", "ui/chat_ui.py", "--api-url", "http://api:8000", "--port", "7860"]
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - smartb100_net

networks:
  smartb100_net:
    driver: bridge
