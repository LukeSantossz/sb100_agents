name: CI/CD Pipeline

# 1. Gatilhos (Triggers)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 2. Trabalhos (Jobs)
jobs:
  # Integração Contínua (CI)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Essencial para performance

      - name: Instalar dependências Frontend
        run: cd frontend/smartb100 && npm ci

      - name: Testar build do Frontend (Validação)
        run: cd frontend/smartb100 && npm run build

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Executar testes Python
        run: python -m unittest discover -s tests -v

  # Entrega/Deploy Contínuo (CD)
  deploy:
    needs: build-and-test # Só executa se o CI passar
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Só faz deploy na branch main
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # EXEMPLO: Deploy usando o Docker Compose no servidor via SSH ou Webhook
      - name: Executar Deploy
        env:
          # Variável atrelada ao secret que você criou no repositório!
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET_SB100 }}
        run: |
          echo "Executando processo de deploy..."
          
          # Como este projeto usa Docker Compose, o deploy geralmente é feito rodando isso no servidor alvo:
          # docker-compose pull && docker-compose up -d --build
          
          # OPÇÃO A: Se o DEPLOY_SECRET_SB100 for uma senha/chave de Webhook (ex: Portainer):
          # curl -X POST "https://seu-servidor.online/api/webhooks/xxxx?token=$DEPLOY_SECRET"
          
          # OPÇÃO B: Se quiser rodar SSH direto, você pode configurar o Deploy Keys / SSH Actions usando o secret.
          echo "Por favor, substitua esse run com as chamadas de deploy para o seu host alvo (AWS, Hostinger, DigitalOcean, etc)."