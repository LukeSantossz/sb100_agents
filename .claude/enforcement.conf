# enforcement.conf — Debug Log Patterns by Language
# Format: extension:pattern (one per line)
# Lines starting with # are comments
# Patterns are grep-compatible regex

# JavaScript/TypeScript
js:console\.(log|debug|info|warn|error)\s*\(
ts:console\.(log|debug|info|warn|error)\s*\(
jsx:console\.(log|debug|info|warn|error)\s*\(
tsx:console\.(log|debug|info|warn|error)\s*\(
js:debugger
ts:debugger
jsx:debugger
tsx:debugger

# Python
py:print\s*\(
py:breakpoint\s*\(
py:pdb\.set_trace\s*\(
py:import\s+pdb
py:from\s+pdb\s+import

# Java
java:System\.out\.print
java:System\.err\.print

# Go
go:fmt\.Print
go:log\.Print

# Ruby
rb:puts\s
rb:p\s
rb:binding\.pry
rb:byebug

# PHP
php:var_dump\s*\(
php:print_r\s*\(
php:dd\s*\(

# Rust
rs:println!\s*\(
rs:dbg!\s*\(

# C/C++
c:printf\s*\(
cpp:cout\s*<<
cpp:cerr\s*<<
